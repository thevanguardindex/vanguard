<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanguard Index</title>

<style>
:root {
  --bg:#000;
  --red:#ff2b2b;
  --line:#2a0000;
  --dom:#ff2b2b;
  --intl:#ff7a2b;
  --union:#2bff9a;
  --main:#2bb3ff;
}

/* ───────── BASE (READABILITY FIRST) ───────── */
body {
  margin:0;
  background:var(--bg);
  color:var(--red);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 20px;
  line-height: 1.6;
}

/* ───────── HEADER ───────── */
header {
  padding: 26px 14px 12px;
  border-bottom: 1px solid var(--line);
  text-align:center;
}

h1 {
  margin:0;
  font-size: 34px;
  letter-spacing: 1px;
  font-weight: 700;
  color: var(--red);
}

.subtitle {
  margin-top:10px;
  font-size: 16px;
  opacity:0.85;
  max-width: 950px;
  margin-left:auto;
  margin-right:auto;
}

/* ───────── PANELS ───────── */
#panelBar {
  padding: 14px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  border-bottom:1px solid var(--line);
}

button {
  background:transparent;
  border:1px solid var(--red);
  color:var(--red);
  padding:12px 14px;
  cursor:pointer;
  font-size:16px;
  border-radius:4px;
}

button.off {
  opacity:0.35;
  border-color:var(--line);
}

.p-domestic { border-color:var(--dom); color:var(--dom); }
.p-international { border-color:var(--intl); color:var(--intl); }
.p-unions { border-color:var(--union); color:var(--union); }
.p-mainstream { border-color:var(--main); color:var(--main); }

/* ───────── PANEL DESCRIPTION ───────── */
.panelDesc {
  text-align:center;
  font-size:16px;
  opacity:0.85;
  padding:16px;
  border-bottom:1px solid var(--line);
  max-width:950px;
  margin:0 auto;
}

/* ───────── FILTERS ───────── */
#filters {
  padding:12px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  border-bottom:1px solid var(--line);
}

#filters button {
  font-size:15px;
  padding:10px 12px;
}

/* ───────── FEED ───────── */
#feed {
  padding: 20px;
  max-width: 950px;
  margin: 0 auto;
}

/* ARTICLE BLOCKS */
.item {
  padding: 22px 0;
  border-bottom: 1px solid #220000;
}

/* HEADLINES */
.item a {
  color: var(--red);
  text-decoration: none;
  font-size: 24px;
  font-weight: 600;
  line-height: 1.5;
}

.item a:hover {
  text-decoration: underline;
}

/* META INFO */
.meta {
  margin-top: 8px;
  font-size: 15px;
  opacity: 0.85;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

/* TAGS */
.tag {
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid;
  font-size: 12px;
}

.t-dom { color:var(--dom); border-color:var(--dom); }
.t-int { color:var(--intl); border-color:var(--intl); }
.t-uni { color:var(--union); border-color:var(--union); }
.t-main { color:var(--main); border-color:var(--main); }

</style>
</head>

<body>

<header>
  <h1>Vanguard Index</h1>
  <div class="subtitle">
    A structured political media aggregator tracking Marxist press, labour movement communication, union updates, and Australian mainstream news for comparative analysis of class perspectives and narrative framing.
  </div>
</header>

<div id="panelBar"></div>
<div id="panelInfo"></div>
<div id="filters"></div>
<div id="feed">initialising...</div>

<script>

const API="https://api.rss2json.com/v1/api.json?rss_url=";

/* ───────── PANELS ───────── */
const PANELS={
  domestic:{
    name:"Domestic Marxist",
    class:"p-domestic",
    desc:"Australian Marxist and socialist publications focused on labour politics, organising, and domestic political economy.",
    feeds:[
      {url:"https://www.greenleft.org.au/rss.xml",tag:"DOM",name:"Green Left"},
      {url:"https://labortribune.net.au/feed/",tag:"DOM",name:"Labor Tribune"},
      {url:"https://partisanmagazine.org/feed/",tag:"DOM",name:"Partisan"},
      {url:"https://redflag.org.au/rss/",tag:"DOM",name:"Red Flag"},
      {url:"https://solidarity.net.au/feed/",tag:"DOM",name:"Solidarity"}
    ]
  },

  international:{
    name:"International Marxist",
    class:"p-international",
    desc:"Global socialist and Marxist media covering international labour struggles, theory, and political developments.",
    feeds:[
      {url:"https://aworldtowinns.co.uk/feed/",tag:"INT",name:"A World To Win"},
      {url:"https://jacobin.com/feed/",tag:"INT",name:"Jacobin"},
      {url:"https://liberationnews.org/feed/",tag:"INT",name:"Liberation News"},
      {url:"https://monthlyreview.org/feed/",tag:"INT",name:"Monthly Review"},
      {url:"https://newleftreview.org/feed",tag:"INT",name:"New Left Review"},
      {url:"https://peoplesdispatch.org/feed/",tag:"INT",name:"Peoples Dispatch"}
    ]
  },

  unions:{
    name:"Unions",
    class:"p-unions",
    desc:"Australian trade unions and labour organisations. Some feeds may load slower due to inconsistent server response times, but all remain functional.",
    feeds:[
      {url:"https://www.actu.org.au/media-release/feed/",tag:"UNI",name:"ACTU"},
      {url:"https://www.aeufederal.org.au/rss/latest",tag:"UNI",name:"AEU"},
      {url:"https://www.amwu.org.au/media_releases.rss",tag:"UNI",name:"AMWU"},
      {url:"https://cg.cfmeu.org/feed/",tag:"UNI",name:"CFMEU"},
      {url:"https://www.ieu.org.au/feed/",tag:"UNI",name:"IEU"},
      {url:"https://meu.org.au/feed/",tag:"UNI",name:"MEU"},
      {url:"https://www.rtbu.org.au/transport_now.rss",tag:"UNI",name:"RTBU"},
      {url:"https://unitedworkers.org.au/feed/",tag:"UNI",name:"United Workers"}
    ]
  },

  mainstream:{
    name:"Australian Mainstream",
    class:"p-mainstream",
    desc:"Mainstream Australian media providing institutional and centrist framing of national political and economic issues.",
    feeds:[
      {url:"https://feeds.feedburner.com/IndependentAustralia",tag:"MAIN",name:"Independent Australia"},
      {url:"https://michaelwest.com.au/feed/",tag:"MAIN",name:"Michael West"},
      {url:"https://www.abc.net.au/news/feed/104217372/rss.xml",tag:"ABC",name:"ABC News"},
      {url:"https://www.abc.net.au/news/feed/10719986/rss.xml",tag:"ABC",name:"ABC Politics"},
      {url:"https://www.theguardian.com/australia-news/rss",tag:"MAIN",name:"Guardian AU"}
    ]
  }
};

let activePanel="domestic";
let activeSources={};
let activeTags={};

function init(){
  PANELS[activePanel].feeds.forEach(f=>{
    activeSources[f.name]=true;
    activeTags[f.tag]=true;
  });
}
init();

function renderPanels(){
  document.getElementById("panelBar").innerHTML=
    Object.keys(PANELS).map(k=>`
      <button class="${PANELS[k].class} ${activePanel===k?'':'off'}"
        onclick="setPanel('${k}')">
        ${PANELS[k].name}
      </button>
    `).join("");
}

function renderPanelInfo(){
  document.getElementById("panelInfo").innerHTML=
    `<div class="panelDesc">${PANELS[activePanel].desc}</div>`;
}

function renderFilters(){
  const feeds=PANELS[activePanel].feeds;

  const tags=[...new Set(feeds.map(f=>f.tag))].map(t=>
    `<button onclick="toggleTag('${t}')" class="${activeTags[t]?'':'off'}">${t}</button>`
  ).join("");

  const sources=feeds.map(f=>
    `<button onclick="toggleSource('${f.name}')" class="${activeSources[f.name]?'':'off'}">${f.name}</button>`
  ).join("");

  document.getElementById("filters").innerHTML=tags+sources;
}

function setPanel(p){
  activePanel=p;
  activeSources={};
  activeTags={};
  init();
  renderPanels();
  renderPanelInfo();
  renderFilters();
  load();
}

function toggleTag(t){
  activeTags[t]=!activeTags[t];
  renderFilters();
  load();
}

function toggleSource(n){
  activeSources[n]=!activeSources[n];
  renderFilters();
  load();
}

async function load(){
  const out=document.getElementById("feed");
  out.innerHTML="syncing...";

  let all=[];

  const feeds=PANELS[activePanel].feeds;

  await Promise.all(feeds.map(async f=>{

    if(!activeSources[f.name]) return;
    if(!activeTags[f.tag]) return;

    try{
      const res=await fetch(API+encodeURIComponent(f.url));
      const data=await res.json();
      if(!data.items) return;

      data.items.forEach(i=>{
        const link=i.link||i.guid||(i.enclosure&&i.enclosure.link)||"";
        if(!link||!i.title) return;

        all.push({
          title:i.title,
          link,
          date:i.pubDate,
          source:f.name,
          tag:f.tag
        });
      });

    }catch(e){}
  }));

  all.sort((a,b)=>new Date(b.date)-new Date(a.date));

  out.innerHTML=all.slice(0,180).map(i=>`
    <div class="item">
      <a href="${i.link}" target="_blank">${i.title}</a>
      <div class="meta">
        <span class="tag t-${i.tag==='DOM'?'dom':i.tag==='INT'?'int':i.tag==='UNI'?'uni':'main'}">${i.tag}</span>
        <span>${i.source}</span>
        <span>${i.date||""}</span>
      </div>
    </div>
  `).join("");
}

renderPanels();
renderPanelInfo();
renderFilters();
load();

</script>

</body>
</html>
