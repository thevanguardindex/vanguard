<script>
// ═══════════════════════════════════════════════════════
// CONFIG — EDIT THESE
// ═══════════════════════════════════════════════════════
const BASE_URL = 'http://localhost:8080/i/';  // Change to your public domain later, e.g. https://vanguard.example.com/
const USERNAME = 'admin';                     // Your FreshRSS username
const API_PASSWORD = '1234567';               // Your API password

const API_ENDPOINT = BASE_URL + 'api/fever.php';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let categories = [];   // FreshRSS groups
let feeds = [];
let itemsByCat = {};   // cat_id → items[]
let view = 'home';
let apiKey = '';

// Compute Fever api_key = md5(username:api_password)
async function initApiKey() {
  const str = `${USERNAME}:${API_PASSWORD}`;
  const enc = new TextEncoder().encode(str);
  const hashBuffer = await crypto.subtle.digest('MD5', enc);
  apiKey = Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

// Simple POST helper for Fever API
async function feverCall(params) {
  const form = new FormData();
  form.append('api_key', apiKey);
  Object.keys(params).forEach(k => form.append(k, params[k]));

  const resp = await fetch(API_ENDPOINT, { method: 'POST', body: form });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return await resp.json();
}

// ═══════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════
async function loadData() {
  try {
    document.getElementById('stat').textContent = 'Loading categories...';
    const groupsResp = await feverCall({ groups: '' });
    categories = groupsResp.groups || [];

    const feedsResp = await feverCall({ feeds: '' });
    feeds = feedsResp.feeds || [];

    // Load items per category (or use 'items' for global)
    document.getElementById('stat').textContent = 'Fetching articles...';
    for (const cat of categories) {
      const itemsResp = await feverCall({ items: '', by_category: cat.id });
      itemsByCat[cat.id] = (itemsResp.items || []).map(item => ({
        id: item.id,
        title: item.title,
        link: item.url,
        desc: item.content ? stripHtml(item.content).slice
